spring:
  application:
    name: api
  hiddenmethod:
    filter:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/logicademia?useUnicode=true&serverTimezone=Asia/Seoul&autoReconnect=true&allowMultiQueries=true
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    open-in-view: false

logging:
  level:
    root: INFO
    org:
      hibernate:
        type:
          descriptor.sql: trace
    com:
      amazonaws:
        util:
          EC2MetadataUtils: error