spring:
  application:
    name: api
  datasource:
    url: jdbc:mysql://localhost:3306/logicademia_test?useUnicode=true&serverTimezone=Asia/Seoul
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    open-in-view: false

logging:
  level:
    root: INFO
    org:
      hibernate:
        type:
          descriptor.sql: trace
